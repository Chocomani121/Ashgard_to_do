<!doctype html>
<html lang="en">

    <head>

        <meta charset="utf-8" />
        <title>Recover Password | webadmin - Admin & Dashboard Template</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta content="Premium Multipurpose Admin & Dashboard Template" name="description" />
        <meta content="Themesdesign" name="author" />
        <!-- App favicon -->
        <link rel="shortcut icon" href="static/assets/images/favicon.ico">

        <!-- Bootstrap Css -->
        <link href="static/assets/css/bootstrap.min.css" id="bootstrap-style" rel="stylesheet" type="text/css" />
        <!-- Icons Css -->
        <link href="static/assets/css/icons.min.css" rel="stylesheet" type="text/css" />
        <!-- App Css-->
        <link href="static/assets/css/app.min.css" id="app-style" rel="stylesheet" type="text/css" />

    </head>

    
    <body>
<div class="authentication-bg min-vh-100">
    <div class="container-fluid">
        <div class="row min-vh-100">

            <!-- Left Column: Image / Info (hidden on mobile) -->
            <div class="col-md-6 d-none d-md-flex justify-content-center align-items-center bg-dark text-white">
                <div class="text-center p-4">
                    <img src="../static/assets/images/ashgard-logo.png" alt="Reset Image" class="img-fluid mb-3" style="max-height: 200px;">
                    <h1 class="text-light">Ashgard <br>To-Do</h1>
                </div>
            </div>

            <!-- Right Column: Reset Password Form -->
            <div class="col-12 col-md-6 d-flex flex-column justify-content-center align-items-center bg-light">
                <div class="col-12 col-md-6">

                    <!-- Logo -->
                    <div class="mb-4 pb-2 text-center">
                        <a href="index.html" class="d-block auth-logo">
                        </a>
                    </div>

                    <!-- Card -->
                    <div class="card">
                        <div class="card-body p-4">

                            <div class="mt-2 text-center">
                                <h5>Reset Password</h5>
                                <p class="text-muted">Reset your password with webadmin</p>
                            </div>

                            <div class="p-2 mt-4">

                                <div class="alert alert-success text-center small mb-4" role="alert">
                                    Enter your email and instructions will be sent to you!
                                </div>

                                <form action="index.html">
                                    <div class="mb-3">
                                        <label class="form-label" for="useremail">Email</label>
                                        <div class="position-relative input-custom-icon">
                                            <input type="email" class="form-control" id="useremail" placeholder="Enter email">
                                            <span class="bx bx-mail-send"></span>
                                        </div>
                                    </div>

                                    <div class="mt-4">
                                        <button class="btn btn-primary w-100 waves-effect waves-light" type="submit">
                                            Reset Password
                                        </button>
                                    </div>

                                    <div class="mt-4 text-center">
                                        <p class="mb-0">
                                            Remember it?
                                            <a href="{{ url_for('users.login') }}" class="fw-medium text-primary">
                                                Sign in
                                            </a>
                                        </p>
                                    </div>
                                </form>

                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>
