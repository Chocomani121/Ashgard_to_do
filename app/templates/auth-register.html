<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Register | Ashgard To-Do</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content="Ashgard To-Do Dashboard Template" name="description" />
    <meta content="Themesdesign" name="author" />
    <!-- App favicon -->
    <link rel="shortcut icon" href="static/assets/images/favicon.ico">

    <!-- Bootstrap Css -->
    <link href="static/assets/css/bootstrap.min.css" id="bootstrap-style" rel="stylesheet" type="text/css" />
    <!-- Icons Css -->
    <link href="static/assets/css/icons.min.css" rel="stylesheet" type="text/css" />
    <!-- App Css-->
    <link href="static/assets/css/app.min.css" id="app-style" rel="stylesheet" type="text/css" />
</head>

<body>

<div class="authentication-bg min-vh-100">
    <div class="container-fluid">
        <div class="row min-vh-100">

            <!-- Left Column: Image / Info (hidden on mobile) -->
            <div class="col-md-6 d-none d-md-flex justify-content-center align-items-center bg-dark text-white">
                <div class="text-center p-4">
                    <img src="static/assets/images/ashgard-logo.png" alt="Register Image" class="img-fluid mb-3" style="max-height: 200px;">
                    <h1 class="text-light">Ashgard </br>To-Do</h1>
                </div>
            </div>

            <!-- Right Column: Register Form -->
            <div class="col-12 col-md-6 d-flex flex-column justify-content-center align-items-center bg-light">
                <div class="col-12 col-md-6">

                    <div class="mb-4 pb-2 text-center">
                        <a href="index.html" class="d-block auth-logo">
                            <img src="assets/images/logo-dark.png" alt="" height="30" class="auth-logo-dark me-start">
                            <img src="assets/images/logo-light.png" alt="" height="30" class="auth-logo-light me-start">
                        </a>
                    </div>

                    <div class="card">
                        <div class="card-body p-4"> 
                            <div class="mt-2 text-center">
                                <h5>Register Account</h5>
                                <p class="text-muted">Sign up to create your account</p>
                            </div>

                            <div class="p-2 mt-4">
                                <form action="index.html">

                                    <div class="mb-3">
                                        <label class="form-label" for="useremail">Email</label>
                                        <div class="position-relative input-custom-icon">
                                            <input type="email" class="form-control" id="useremail" placeholder="Enter email">  
                                            <span class="bx bx-mail-send"></span>
                                        </div>     
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label" for="username">Username</label>
                                        <div class="position-relative input-custom-icon">
                                            <input type="text" class="form-control" id="username" placeholder="Enter username">
                                            <span class="bx bx-user"></span>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label" for="userpassword">Password</label>
                                        <div class="position-relative auth-pass-inputgroup input-custom-icon">
                                            <span class="bx bx-lock-alt"></span>
                                            <input type="password" class="form-control" id="password-input" placeholder="Enter password">
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                            <label class="form-label" for="confirmPassword-input">Confirm Password</label>
                                            <div class="position-relative auth-pass-inputgroup input-custom-icon">
                                                <span class="bx bx-lock-alt"></span>
                                                
                                                <input type="password" class="form-control" id="confirmPassword-input" placeholder="Confirm password">
                                                
                                                <button class="btn btn-link position-absolute end-0 top-0 text-decoration-none text-muted" type="button" id="confirmPassword-addon">
                                                    <i class="ri-eye-fill align-middle"></i>
                                                </button>
                                            </div>
                                        </div>

                                    <div class="mt-3">
                                        <button class="btn btn-primary w-100 waves-effect waves-light" type="submit">Register</button>
                                    </div>

                                    <div class="mt-4 text-center">
                                        <p class="mb-0">Already have an account? 
                                            <a href="{{ url_for('main.login') }}" class="fw-medium text-primary"> Login</a>
                                        </p>
                                    </div>

                                </form>
                            </div>

                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- JAVASCRIPT -->
<script src="static/assets/libs/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="static/assets/libs/metismenujs/metismenujs.min.js"></script>
<script src="static/assets/libs/simplebar/simplebar.min.js"></script>
<script src="static/assets/libs/eva-icons/eva.min.js"></script>

</body>
</html>
